name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Bağımlılıklar
        run: npm ci

      - name: Tip kontrolü
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Birim testler
        run: npx vitest run

      - name: Build (deploy ile birebir — scripts/build.js, OOM korumalı)
        run: npm run build
        env:
          # Build için Firebase yapılandırması gerekmez (demo fallback) — ama
          # NODE_ENV=production'da demo fallback kapalı olduğundan public env'ler
          # placeholder olarak verilir; gerçek değerler deploy ortamında tanımlanır.
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-project"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1:web:ci"

  rules-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Java kurulumu (Firestore emülatörü için)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Bağımlılıklar
        run: npm ci

      - name: Firebase CLI
        run: npm install -g firebase-tools

      - name: Rules testleri (emülatörlü)
        run: |
          firebase emulators:exec --only firestore --project demo-musavir \
            "npm run test:rules"

  # ── Deploy kapısı: yalnızca CI (quality + rules-test) YEŞİL ise Hostinger'a
  #    deploy'u tetikler. main'e push'ta çalışır; PR'larda çalışmaz.
  #    Kurulum (bir kez):
  #      1) hPanel → Git → "push'ta otomatik deploy"u KAPAT.
  #      2) hPanel'den deploy webhook (deploy hook) URL'sini al.
  #      3) GitHub → repo Settings → Secrets and variables → Actions →
  #         New secret: HOSTINGER_DEPLOY_HOOK = <webhook URL>.
  #    Secret tanımlı değilken bu iş güvenle atlanır (Hostinger auto-deploy'a
  #    dokunulmaz), böylece kurulumdan önce yanlış alarm vermez.
  deploy:
    needs: [quality, rules-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Hostinger deploy'u tetikle (yalnızca CI yeşilse)
        env:
          HOOK: ${{ secrets.HOSTINGER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::HOSTINGER_DEPLOY_HOOK secret tanımlı değil — webhook deploy'u atlandı."
            echo "Kurulum için ci.yml'deki 'Deploy kapısı' yorumundaki adımları izleyin."
            exit 0
          fi
          echo "CI yeşil — Hostinger deploy webhook'u tetikleniyor..."
          curl -fsS -X POST "$HOOK"
          echo ""
          echo "✔ Deploy tetiklendi."

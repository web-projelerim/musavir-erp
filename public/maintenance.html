<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bakımdayız — MusavirERP</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #172554 100%);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e2e8f0; padding: 1.5rem;
    }
    .box { text-align: center; max-width: 420px; }
    .logo { width: 80px; height: 80px; border-radius: 16px; object-fit: cover;
            margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; color: #fff; }
    p { font-size: 15px; line-height: 1.6; color: #cbd5e1; margin: 0; }
    .brand { margin-top: 32px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="box">
    <img class="logo" src="/logo-mm.jpg" alt="MusavirERP" />
    <h1>Şu anda bakımdayız</h1>
    <p>Kısa sürecek. Anlayışınız için teşekkür ederiz.</p>
    <p class="brand">MusavirERP</p>
  </div>
</body>
</html>
